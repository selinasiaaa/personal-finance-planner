<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthTrack — Investments</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="investments">
<main class="main-content" id="mainContent">
<section id="investments-section" class="app-section active-section">
  <div class="page-header d-flex align-items-center justify-content-between mb-4">
    <h1 class="page-title">Investments</h1>
    <div class="d-flex gap-3 align-items-center">
      <div class="search-box"><i class="bi bi-search search-icon"></i><input type="text" placeholder="Search goals, funds…" /></div>
      <button class="btn-primary-action"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
  </div>
  <div class="inv-container">
    <h2 class="inv-main-title">Choose Your Risk Profile</h2>
    <p class="inv-main-sub">Choose a risk level based on your goals and time horizon.</p>
    <div class="risk-tabs mb-4" id="riskTabs">
      <button class="risk-tab" data-risk="conservative">Conservative</button>
      <button class="risk-tab" data-risk="balanced">Balanced</button>
      <button class="risk-tab" data-risk="aggressive">Aggressive</button>
    </div>
    <div id="riskContent"></div>
    <div class="d-flex justify-content-end mt-4">
      <button class="btn-primary-action px-5" id="applyPortfolioBtn">Apply this portfolio</button>
    </div>
  </div>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="sidebar.js"></script>
<script src="app.js"></script>
</body>
</html>
