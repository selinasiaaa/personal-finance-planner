<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthTrack — Market Insights</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="dashboard">
  <main class="main-content" id="mainContent">
    <section id="dashboard-section" class="app-section active-section">
      <div class="page-header d-flex align-items-center justify-content-between mb-4">
        <h1 class="page-title">Market Insights Dashboard</h1>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="summary-card summary-blue">
            <p class="summary-label">Market Trend</p>
            <h2 class="summary-value">Bullish</h2>
            <p class="summary-sub">S&P 500 up 2.5%</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="summary-card summary-green">
            <p class="summary-label">Top Performer</p>
            <h2 class="summary-value">Tech Stocks</h2>
            <p class="summary-sub">+15% this month</p>
          </div>
        </div>
        <div class="col-md-4">
          <div class="summary-card summary-orange">
            <p class="summary-label">Risk Level</p>
            <h2 class="summary-value">Moderate</h2>
            <p class="summary-sub">Balanced portfolio</p>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h5>Market Data</h5>
        </div>
        <div class="card-body">
          <p>Market insights content here. Connect to API for real data.</p>
        </div>
      </div>
    </section>
  </main>
  <script src="sidebar.js"></script>
  <script src="app.js"></script>
</body>
</html>
