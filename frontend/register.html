<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthTrack — Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="register">
  <main class="main-content" id="mainContent">
    <section id="register-section" class="app-section active-section">
      <div class="page-header d-flex align-items-center justify-content-center mb-4">
        <h1 class="page-title">Join WealthTrack</h1>
      </div>
      <div class="auth-container" style="max-width: 500px; margin: 0 auto; padding: 40px 20px;">
        <div class="auth-card" style="box-shadow: none; border: 1px solid var(--border);">
          <div class="auth-header">
            <h2>Create Account</h2>
            <p>Start managing your finances today</p>
          </div>
          <form id="registerForm" class="auth-form">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required placeholder="Create a password" minlength="8">
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
            </div>
            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox" id="agreeTerms" required> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
              </label>
            </div>
            <button type="submit" class="btn-auth">Create Account</button>
          </form>
          <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="sidebar.js"></script>
  <script src="app.js"></script>
</body>
</html>
