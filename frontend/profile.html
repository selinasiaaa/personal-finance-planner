<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthTrack — Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="profile">
  <main class="main-content" id="mainContent">
    <section id="profile-section" class="app-section active-section">
      <div class="page-header d-flex align-items-center justify-content-between mb-4">
        <h1 class="page-title">Profile Management</h1>
        <div class="d-flex gap-3">
          <button id="logoutBtn" style="background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: var(--r-sm); cursor: pointer; font-weight: 600; transition: background var(--T); font-family: var(--font-b);" onmouseover="this.style.background='var(--text-dark)'" onmouseout="this.style.background='var(--red)'">Logout</button>
        </div>
      </div>
      <div class="alert-banner mb-4">
        <i class="bi bi-info-circle-fill me-2"></i>
        <span><strong>Welcome back!</strong> Your profile is up to date.</span>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-6 col-xl-3">
          <div class="summary-card summary-blue">
            <p class="summary-label">Account Status</p>
            <h2 class="summary-value">Active</h2>
            <p class="summary-sub">Premium Plan</p>
          </div>
        </div>
        <div class="col-6 col-xl-3">
          <div class="summary-card summary-green">
            <p class="summary-label">Profile Completion</p>
            <h2 class="summary-value">85%</h2>
            <p class="summary-sub">Add phone number</p>
          </div>
        </div>
        <div class="col-6 col-xl-3">
          <div class="summary-card summary-orange">
            <p class="summary-label">Last Login</p>
            <h2 class="summary-value">Today</h2>
            <p class="summary-sub">Secure session</p>
          </div>
        </div>
        <div class="col-6 col-xl-3">
          <div class="summary-card summary-purple">
            <p class="summary-label">Goals Linked</p>
            <h2 class="summary-value">7</h2>
            <p class="summary-sub">Active goals</p>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-8">
          <div class="profile-card" style="background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--r-card); padding: 24px; box-shadow: var(--shadow);">
            <h5 style="font-family: var(--font-h); font-size: 1.1rem; margin-bottom: 20px; color: var(--text-dark);">Profile Information</h5>
            <form id="profileForm">
              <div class="mb-3">
                <label for="profileName" class="form-label" style="font-weight: 500; color: var(--text-dark);">Full Name</label>
                <input type="text" class="form-control" id="profileName" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;" required>
              </div>
              <div class="mb-3">
                <label for="profileEmail" class="form-label" style="font-weight: 500; color: var(--text-dark);">Email</label>
                <input type="email" class="form-control" id="profileEmail" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;" required>
              </div>
              <div class="mb-3">
                <label for="profilePhone" class="form-label" style="font-weight: 500; color: var(--text-dark);">Phone Number</label>
                <input type="tel" class="form-control" id="profilePhone" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;">
              </div>
              <div class="mb-3">
                <label for="profileDOB" class="form-label" style="font-weight: 500; color: var(--text-dark);">Date of Birth</label>
                <input type="date" class="form-control" id="profileDOB" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;">
              </div>
              <div class="mb-3">
                <label for="profileOccupation" class="form-label" style="font-weight: 500; color: var(--text-dark);">Occupation</label>
                <input type="text" class="form-control" id="profileOccupation" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;">
              </div>
              <div class="mb-3">
                <label for="profileAddress" class="form-label" style="font-weight: 500; color: var(--text-dark);">Address</label>
                <input type="text" class="form-control" id="profileAddress" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;">
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="profileCity" class="form-label" style="font-weight: 500; color: var(--text-dark);">City</label>
                  <input type="text" class="form-control" id="profileCity" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="profileCountry" class="form-label" style="font-weight: 500; color: var(--text-dark);">Country</label>
                  <input type="text" class="form-control" id="profileCountry" style="border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px;">
                </div>
              </div>
              <button type="submit" class="btn-primary-action" style="background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: var(--r-sm); cursor: pointer; font-weight: 600; transition: background var(--T);" onmouseover="this.style.background='var(--blue-dark)'" onmouseout="this.style.background='var(--blue)'">Update Profile</button>
            </form>
          </div>
        </div>
        <div class="col-md-4">
          <div class="profile-card" style="background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--r-card); padding: 24px; box-shadow: var(--shadow);">
            <h5 style="font-family: var(--font-h); font-size: 1.1rem; margin-bottom: 20px; color: var(--text-dark);">Account Actions</h5>
            <button class="btn-secondary" id="changePasswordBtn" style="width: 100%; background: var(--orange); color: white; border: none; padding: 10px 16px; border-radius: var(--r-sm); cursor: pointer; font-weight: 600; margin-bottom: 12px; transition: background var(--T);" onmouseover="this.style.background='#e07612'" onmouseout="this.style.background='var(--orange)'">Change Password</button>
            <button class="btn-danger" id="deleteAccountBtn" style="width: 100%; background: var(--red); color: white; border: none; padding: 10px 16px; border-radius: var(--r-sm); cursor: pointer; font-weight: 600; transition: background var(--T);" onmouseover="this.style.background='#cc0000'" onmouseout="this.style.background='var(--red)'">Delete Account</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="sidebar.js"></script>
  <script src="app.js"></script>
</body>
</html>
