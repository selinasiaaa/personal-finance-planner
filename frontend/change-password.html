<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WealthTrack — Change Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="change-password">
  <main class="main-content" id="mainContent">
    <section id="change-password-section" class="app-section active-section">
      <div class="page-header d-flex align-items-center justify-content-center mb-4">
        <h1 class="page-title">Change Password</h1>
      </div>

      <div class="auth-container" style="max-width: 520px; margin: 0 auto; padding: 40px 20px;">
        <div class="auth-card" style="box-shadow: none; border: 1px solid var(--border);">
          <div class="auth-header">
            <h2>Change Password</h2>
            <p>Update your password to keep your account secure</p>
          </div>

          <form id="changePasswordForm" class="auth-form">
            <div class="form-group">
              <label for="currentPassword">Current Password</label>
              <input type="password" id="currentPassword" name="currentPassword" required placeholder="Enter current password" autocomplete="current-password">
            </div>

            <div class="form-group">
              <label for="newPassword">New Password</label>
              <input type="password" id="newPassword" name="newPassword" required placeholder="Enter new password" autocomplete="new-password">
            </div>

            <div class="form-group">
              <label for="confirmNewPassword">Confirm Password</label>
              <input type="password" id="confirmNewPassword" name="confirmNewPassword" required placeholder="Confirm new password" autocomplete="new-password">
            </div>

            <div class="auth-footer" style="margin-top: 12px; text-align: left;">
              <p><a href="forgot-password.html">Forgot password?</a></p>
            </div>

            <div class="d-flex gap-3 mt-3">
              <button type="button" class="btn-modal-cancel flex-fill" id="cancelChangePasswordBtn">Cancel</button>
              <button type="submit" class="btn-modal-save flex-fill">Save</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="sidebar.js"></script>
  <script src="app.js"></script>
</body>
</html>
